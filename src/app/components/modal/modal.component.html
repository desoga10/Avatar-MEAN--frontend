<div class="modal-dialog">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title" id="staticBackdropLabel">Modal title</h5>
      <button #closeModal type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="hideModel()"></button>
    </div>

    <div class="modal-body">
      <img src={{avatar?.avatar}} alt="" class="avatar-img">
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="editAvatar()">Edit</button>
      <button type="button" class="btn btn-danger" (click)="deleteAvatar()">Delete</button>
    </div>
  </div>
</div>
