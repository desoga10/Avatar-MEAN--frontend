<form [formGroup]="editAvatarForm" (ngSubmit)="onSubmit()">
  <div class="mt-5 container d-flex flex-column align-items-center justify-content-center">
    <div class="col-4">
      <input class="form-control" id="ex3" type="text" placeholder="avatar name" formControlName="name">
    </div>
  <br />
    <div class="mb-3 col-4">
      <input class="form-control" type="file" id="formFile" (change)="uploadAvatar($event)">
    </div>
    <button class="btn btn-success" [disabled]="editAvatarForm.invalid">Submit</button>

  </div>
  </form>
